<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDX Bot • Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0e17;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: #111827;
            padding: 20px 30px;
            border-bottom: 2px solid #22c55e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #22c55e; font-size: 24px; }
        .header .status { 
            background: #22c55e; 
            color: #000; 
            padding: 8px 20px; 
            border-radius: 20px;
            font-weight: bold;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #111827;
            border: 1px solid #22c55e;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #22c55e;
        }
        .stat-card .label {
            color: #9ca3af;
            margin-top: 5px;
            font-size: 14px;
        }
        .panel {
            background: #111827;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .panel h2 { color: #22c55e; margin-bottom: 20px; }
        .btn {
            background: #22c55e;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-warning { background: #f59e0b; color: #000; }
        input, select {
            background: #1f2937;
            border: 1px solid #374151;
            color: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            margin: 5px;
            width: 200px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { color: #22c55e; }
        .badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-online { background: #22c55e; color: #000; }
        .badge-admin { background: #f59e0b; color: #000; }
        .badge-banned { background: #ef4444; color: #fff; }
        .section { display: none; }
        .section.active { display: block; }
        .nav { display: flex; gap: 15px; margin-bottom: 20px; }
        .nav-btn {
            background: #1f2937;
            border: 1px solid #374151;
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .nav-btn.active { background: #22c55e; color: #000; border-color: #22c55e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 RDX Bot Admin Dashboard</h1>
        <div class="status" id="botStatus">🟢 Online</div>
    </div>
    
    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="nav">
            <button class="nav-btn active" onclick="showSection('users')">👥 Users</button>
            <button class="nav-btn" onclick="showSection('settings')">⚙️ Settings</button>
            <button class="nav-btn" onclick="showSection('logs')">📋 Logs</button>
            <button class="nav-btn" onclick="showSection('broadcast')">📢 Broadcast</button>
        </div>
        
        <div class="section active" id="users">
            <div class="panel">
                <h2>👥 Users Management</h2>
                <div style="margin-bottom:20px;">
                    <input type="text" id="newUserNumber" placeholder="Number (92300xxxxxxx)">
                    <button class="btn" onclick="addUser()">➕ Add User</button>
                </div>
                <table>
                    <thead>
                        <tr><th>Number</th><th>Name</th><th>Role</th><th>Status</th><th>Messages</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>
        
        <div class="section" id="settings">
            <div class="panel">
                <h2>⚙️ Bot Settings</h2>
                <label>Prefix:</label>
                <input type="text" id="prefixInput" value=".">
                <button class="btn" onclick="updateSettings()">💾 Save</button>
            </div>
        </div>
        
        <div class="section" id="logs">
            <div class="panel">
                <h2>📋 Message Logs</h2>
                <table>
                    <thead><tr><th>From</th><th>Message</th><th>Time</th></tr></thead>
                    <tbody id="logsTable"></tbody>
                </table>
            </div>
        </div>
        
        <div class="section" id="broadcast">
            <div class="panel">
                <h2>📢 Broadcast Message</h2>
                <textarea id="broadcastMsg" rows="4" style="width:100%;background:#1f2937;color:#fff;border:1px solid #374151;border-radius:10px;padding:15px;"></textarea>
                <button class="btn" onclick="sendBroadcast()" style="margin-top:10px;">📤 Send Broadcast</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        
        async function fetchAPI(url, options = {}) {
            const res = await fetch(url, options);
            return res.json();
        }
        
        async function loadDashboard() {
            const data = await fetchAPI(`${API}/status`);
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="value">${data.bot.status}</div><div class="label">STATUS</div></div>
                <div class="stat-card"><div class="value">${data.stats.totalUsers}</div><div class="label">TOTAL USERS</div></div>
                <div class="stat-card"><div class="value">${data.stats.allowedUsers}</div><div class="label">ALLOWED USERS</div></div>
                <div class="stat-card"><div class="value">${data.bot.uptime}</div><div class="label">UPTIME</div></div>
                <div class="stat-card"><div class="value">${data.system.memory}</div><div class="label">MEMORY</div></div>
                <div class="stat-card"><div class="value">${data.stats.commandsUsed ? Object.keys(data.stats.commandsUsed).length : 0}</div><div class="label">COMMANDS USED</div></div>
            `;
        }
        
        async function loadUsers() {
            const users = await fetchAPI(`${API}/users`);
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.number}</td>
                    <td>${u.name}</td>
                    <td><span class="badge badge-${u.role}">${u.role}</span></td>
                    <td><span class="badge badge-${u.banned ? 'banned' : 'online'}">${u.banned ? 'BANNED' : 'ACTIVE'}</span></td>
                    <td>${u.messageCount}</td>
                    <td>
                        ${u.banned ? 
                            `<button class="btn" onclick="unbanUser('${u.number}')">✅ Unban</button>` :
                            `<button class="btn btn-danger" onclick="banUser('${u.number}')">🚫 Ban</button>`
                        }
                        <button class="btn btn-danger" onclick="removeUser('${u.number}')">🗑️ Remove</button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function loadLogs() {
            const logs = await fetchAPI(`${API}/logs?limit=50`);
            document.getElementById('logsTable').innerHTML = logs.map(l => `
                <tr><td>${l.from}</td><td>${l.text}</td><td>${l.time}</td></tr>
            `).join('');
        }
        
        async function addUser() {
            const number = document.getElementById('newUserNumber').value;
            if (!number) return alert('Number enter karo!');
            const res = await fetchAPI(`${API}/users/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number })
            });
            alert(res.message);
            loadUsers();
            loadDashboard();
        }
        
        async function removeUser(number) {
            if (!confirm('Remove this user?')) return;
            await fetchAPI(`${API}/users/remove`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number })
            });
            loadUsers();
            loadDashboard();
        }
        
        async function banUser(number) {
            await fetchAPI(`${API}/users/ban`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number })
            });
            loadUsers();
        }
        
        async function unbanUser(number) {
            await fetchAPI(`${API}/users/unban`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number })
            });
            loadUsers();
        }
        
        async function updateSettings() {
            await fetchAPI(`${API}/settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prefix: document.getElementById('prefixInput').value })
            });
            alert('Settings saved!');
        }
        
        async function sendBroadcast() {
            const message = document.getElementById('broadcastMsg').value;
            if (!message) return alert('Message likho!');
            const res = await fetchAPI(`${API}/broadcast`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            alert(`Broadcast sent to ${res.sentTo} users!`);
        }
        
        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if (name === 'users') loadUsers();
            if (name === 'logs') loadLogs();
        }
        
        // Initial load
        loadDashboard();
        loadUsers();
        setInterval(loadDashboard, 10000);
    </script>
</body>
</html>
